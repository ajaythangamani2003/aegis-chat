<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="glass">
    <span class="brand-label">AEGIS</span>
    <h3>Create account</h3>

    <input class="form-control" id="fullname" placeholder="Full Name" autocomplete="off">
    <input class="form-control" id="email" placeholder="Email" type="email">
    <input class="form-control" id="username" placeholder="Username" autocomplete="off">
    <input class="form-control" id="password" type="password" placeholder="Password">
    <input class="form-control" id="confirmPassword" type="password" placeholder="Confirm Password">

    <button class="btn btn-success" id="registerBtn" onclick="register()">Register</button>

    <p class="auth-link">Already have account? <a href="login.html">Login</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
