<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="glass">
    <span class="brand-label">AEGIS</span>
    <h3>Welcome back</h3>

    <input class="form-control" type="text" id="username" placeholder="Username" autocomplete="off">
    <input class="form-control" type="password" id="password" placeholder="Password">

    <button class="btn btn-primary" id="loginBtn" onclick="login()">Login</button>

    <p class="auth-link">New here? <a href="register.html">Create account</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
